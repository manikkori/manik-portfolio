<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Me</title>
   <!-- google font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;1,500&family=Poppins:wght@400;700&family=Ysabeau+SC:wght@100&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- google font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,500;1,300;1,400&family=Secular+One&family=Whisper&family=Ysabeau+SC:wght@1;100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: url('../assets/img/pexels-sohi-807598.jpg') no-repeat center center/cover;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .contact-wrapper {
      backdrop-filter: blur(12px);
      background-color: rgba(255, 255, 255, 0.15);
      border-radius: 15px;
      padding: 30px 25px;
      width: 90%;
      max-width: 450px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      color: #fff;
      text-align: center;
    }

    .contact-wrapper h2 {
      margin-bottom: 25px;
      font-size: 2em;
      color: #fff;
    }

    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .form-group {
      text-align: left;
    }

    .form-group label {
      font-size: 0.9em;
      color: #ffffffcc;
      margin-bottom: 5px;
      display: block;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      background-color: rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 0.95em;
      outline: none;
      transition: 0.3s ease;
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: #ddd;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      background-color: rgba(255, 255, 255, 0.3);
      box-shadow: 0 0 5px #0fafd3;
    }

    .submit-btn {
      background: linear-gradient(135deg, #008aa0, #0fafd3);
      color: white;
      border: none;
      padding: 10px 15px;
      font-size: 1em;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .submit-btn:hover {
      background: linear-gradient(135deg, #0fafd3, #008aa0);
      box-shadow: 0 4px 10px rgba(15, 175, 211, 0.4);
    }

    @media (max-width: 500px) {
      .contact-wrapper {
        padding: 25px 20px;
      }
    }
  </style>
</head>
<body onload="fadeIn()">

  <div class="contact-wrapper">
    <h2>Contact Me</h2>
    <form class="contact-form" action="#" method="post">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required placeholder="Your Name" />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="your@email.com" />
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="4" required placeholder="Your Message"></textarea>
      </div>
      <button type="submit" class="submit-btn">Send</button>
    </form>
  </div>

  <script>
      function fadeIn() {
        document.body.style.opacity = 0;
        setTimeout(() => {
          document.body.style.transition = "opacity 0.6s ease-in";
          document.body.style.opacity = 1;
        }, 50);
      }
    </script>

</body>
</html>
